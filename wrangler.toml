name = "yan-gift-finder"
main = "worker.js"
compatibility_date = "2024-09-01"

# After deploy, your worker is reachable at:
#   https://yan-gift-finder.<your-cloudflare-subdomain>.workers.dev
# Copy that URL into gift-finder-ai.html (GIFT_FINDER_ENDPOINT constant).

# DEEPSEEK_API_KEY is added as a Secret, NOT here.
# Get a key at https://platform.deepseek.com → API keys
# Then run: npx wrangler secret put DEEPSEEK_API_KEY
